                        name: "items"
                        widget: "list"
                        required: false
                        label_singular: "Pont"
                        field:
                          label: "Szöveg"
                          name: "i18n"
                          widget: "object"
                          fields:
                            - { label: "Magyar", name: "hu", widget: "string" }
