              - { label: "Sorrend", name: "order", widget: "number", default: 3 }
              - { label: "Látható", name: "visible", widget: "boolean", default: true }

          # ═══════════════════════════════════════════════════════
          # TEXT blokk — rules (szabályrendszer)
          # ═══════════════════════════════════════════════════════
          - label: "Szabályok"
            name: "text-rules"
            widget: "object"
            summary: "Rules · {{id}}"
            fields:
              - { label: "Blokk azonosító", name: "id", widget: "string", required: true, default: "rules-1" }
              - { label: "Típus", name: "type", widget: "hidden", default: "text" }
              - { label: "Elrendezés", name: "layout", widget: "hidden", default: "full" }
              - label: "Tartalom"
                name: "content"
                widget: "object"
                required: true
                fields:
                  - label: "Eyebrow"
                    name: "eyebrow"
                    widget: "object"
                    required: false
                    fields:
                      - { label: "Magyar", name: "hu", widget: "string" }
                      - { label: "English", name: "en", widget: "string" }
                  - label: "Cím"
                    name: "title"
                    widget: "object"
                    required: false
                    fields:
