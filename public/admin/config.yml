              - { label: "Típus", name: "type", widget: "hidden", default: "text" }
              - { label: "Elrendezés", name: "layout", widget: "hidden", default: "full" }
              - label: "Tartalom"
                name: "content"
                widget: "object"
                required: true
                fields:
                  - label: "Eyebrow"
                    name: "eyebrow"
                    widget: "object"
                    required: false
                    fields:
                      - { label: "Magyar", name: "hu", widget: "string" }
                      - { label: "English", name: "en", widget: "string" }
                  - label: "Cím"
                    name: "title"
                    widget: "object"
                    required: false
                    fields:
                      - { label: "Magyar", name: "hu", widget: "string" }
                      - { label: "English", name: "en", widget: "string" }
                  - label: "Pillérekk"
                    name: "pillars"
                    widget: "list"
                    required: false
                    label_singular: "Pillér"
                    fields:
                      - { label: "Ikon (emoji)", name: "icon", widget: "string", default: "🎯" }
                      - label: "Címke"
                        name: "label"
                        widget: "object"
                        required: false
                        fields:
                          - { label: "Magyar", name: "hu", widget: "string" }
                          - { label: "English", name: "en", widget: "string" }
                      - label: "Cím"
                        name: "title"
                        widget: "object"
                        required: false
                        fields:
                          - { label: "Magyar", name: "hu", widget: "string" }
                          - { label: "English", name: "en", widget: "string" }
                      - label: "Leírás"
                        name: "body"
                        widget: "object"
                        required: false
                        fields:
                          - { label: "Magyar", name: "hu", widget: "text" }
                          - { label: "English", name: "en", widget: "text" }
              - label: "Beállítások"
                name: "settings"
                widget: "object"
                required: false
                fields:
                  - { label: "Háttérszín", name: "backgroundColor", widget: "color", default: "#0A0A0A" }
                  - { label: "Padding", name: "padding", widget: "select", options: ["none", "small", "medium", "large"], default: "large" }
              - { label: "Sorrend", name: "order", widget: "number", default: 2 }
              - { label: "Látható", name: "visible", widget: "boolean", default: true }

          # ═══════════════════════════════════════════════════════
          # TEXT blokk — cards (kártya grid)
          # ═══════════════════════════════════════════════════════
          - label: "Kártyák (grid)"
            name: "text-cards"
            widget: "object"
            summary: "Cards · {{id}}"
            fields:
              - { label: "Blokk azonosító", name: "id", widget: "string", required: true, default: "cards-1" }
              - { label: "Típus", name: "type", widget: "hidden", default: "text" }
              - { label: "Elrendezés", name: "layout", widget: "hidden", default: "full" }
              - label: "Tartalom"
                name: "content"
                widget: "object"
                required: true
                fields:
                  - label: "Eyebrow"
                    name: "eyebrow"
                    widget: "object"
                    required: false
                    fields:
                      - { label: "Magyar", name: "hu", widget: "string" }
                      - { label: "English", name: "en", widget: "string" }
                  - label: "Cím"
                    name: "title"
                    widget: "object"
