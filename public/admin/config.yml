                      - { label: "Magyar", name: "hu", widget: "text" }
                      - { label: "English", name: "en", widget: "text" }
                  - label: "Kártyák"
                    name: "cards"
                    widget: "list"
                    required: false
                    label_singular: "Kártya"
                    fields:
                      - { label: "Ikon (emoji)", name: "icon", widget: "string", default: "🏆" }
                      - label: "Cím"
                        name: "title"
                        widget: "object"
                        required: false
                        fields:
                          - { label: "Magyar", name: "hu", widget: "string" }
                          - { label: "English", name: "en", widget: "string" }
                      - label: "Badge"
                        name: "badge"
                        widget: "object"
                        required: false
