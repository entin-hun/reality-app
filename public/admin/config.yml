                    name: "ctaLink"
                    widget: "object"
                    required: false
                    fields:
                      - { label: "Magyar", name: "hu", widget: "string" }
                      - { label: "English", name: "en", widget: "string" }
                  - label: "Szabályok"
                    name: "rules"
                    widget: "list"
                    required: false
                    label_singular: "Szabály"
                    fields:
                      - label: "Cím"
                        name: "title"
                        widget: "object"
                        required: false
                        fields:
                          - { label: "Magyar", name: "hu", widget: "string" }
